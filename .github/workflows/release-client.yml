name: Release Sea Battle Client

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            qt_version: '6.5.3'
            qt_arch: 'win64_msvc2019_64'
            artifact_name: SeaBattleClient_Windows
            binary_name: Client.exe
            suffix: .zip
            source_dir: Sea_Battle_Client

          - os: ubuntu-22.04
            qt_version: '6.5.3'
            qt_arch: 'gcc_64'
            artifact_name: SeaBattleClient_Linux
            binary_name: Client
            suffix: .tar.gz
            source_dir: Sea_Battle_Client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ matrix.qt_version }}
          arch: ${{ matrix.qt_arch }}
          modules: 'qtmultimedia'
          cache: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y build-essential libgl1-mesa-dev libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libssl-dev libqt6multimedia6
          
          wget -c -nv "https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage"
          chmod a+x linuxdeployqt-continuous-x86_64.AppImage
          sudo mv linuxdeployqt-continuous-x86_64.AppImage /usr/local/bin/linuxdeployqt

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S ${{ matrix.source_dir }} -B ${{ matrix.source_dir }}/build \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build ${{ matrix.source_dir }}/build --config Release --parallel

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist = "release_pkg"
          New-Item -ItemType Directory -Force -Path $dist
          
          $exePath = Get-ChildItem -Path "${{ matrix.source_dir }}/build" -Filter "${{ matrix.binary_name }}" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $exePath) { throw "Binary not found in build directory!" }
          
          Copy-Item $exePath "$dist/" -Force
          windeployqt --release --no-translations --no-system-d3d-compiler "$dist/${{ matrix.binary_name }}"
          
          Compress-Archive -Path "$dist/*" -DestinationPath "${{ matrix.artifact_name }}${{ matrix.suffix }}"

      - name: Package Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          dist="release_pkg"
          mkdir -p "$dist"
          
          exe_path=$(find ${{ matrix.source_dir }}/build -type f -name "${{ matrix.binary_name }}" -executable | head -n 1)
          if [ -z "$exe_path" ]; then echo "Binary not found!"; exit 1; fi
          
          cp "$exe_path" "$dist/"
          chmod +x "$dist/${{ matrix.binary_name }}"

          echo -e "#!/bin/bash\nDIR=\$(cd \"\$(dirname \"\$0\")\" && pwd)\nexport LD_LIBRARY_PATH=\"\$DIR/lib:\$LD_LIBRARY_PATH\"\nexec \"\$DIR/${{ matrix.binary_name }}\"" > "$dist/run.sh"
          chmod +x "$dist/run.sh"

          linuxdeployqt "$dist/${{ matrix.binary_name }}" -appimage -unsupported-allow-new-glibc || true
          tar -czf "${{ matrix.artifact_name }}${{ matrix.suffix }}" -C "$dist" .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}${{ matrix.suffix }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: all_artifacts/*
          tag_name: ${{ github.ref_name }}
          body: |
            ### Release ${{ github.ref_name }}
            **Server:** `31.192.108.37:7070`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}